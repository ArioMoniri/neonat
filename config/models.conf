# Model registry for multi-base fine-tune + benchmark.
# Format:  name | hf_id | gated(0/1) | train_flags
# - name        short id used for the adapter dir + leaderboard row
# - hf_id       Hugging Face model id (SWAP freely; e.g. google/gemma-4-* when it ships)
# - gated       1 = needs an accepted license + HF token (Gemma). Skipped if no token.
# - train_flags extra args passed to train_lora.py for this family
#
# Gemma 4 (google/gemma-4-E4B-it) is MULTIMODAL and needs the LATEST transformers
# (the launcher upgrades transformers when a gemma-4 row is planned). The trainer
# loads its text/language part for this text-only card task.
# The teacher (Qwen2.5-72B by default) is set separately via TEACHER, not here.
kumru      | vngrs-ai/Kumru-2B        | 0 |
gemma4-e4b | google/gemma-4-E4B-it    | 1 | --no-unsloth --attn-impl eager
qwen25-3b  | Qwen/Qwen2.5-3B-Instruct | 0 | --no-unsloth
# --- add more students by uncommenting / editing ---
# gemma3-4b  | google/gemma-3-4b-it             | 1 | --no-unsloth --attn-impl eager
# qwen3-4b   | Qwen/Qwen3-4B-Instruct-2507      | 0 | --no-unsloth
# llama32-3b | meta-llama/Llama-3.2-3B-Instruct | 1 | --no-unsloth
